databaseChangeLog:
  - changeSet:
      id: update-category-names
      author: system
      changes:
        - update:
            tableName: danh_muc
            columns:
              - column:
                  name: ten_danh_muc
                  value: 'Đất đai và Bất động sản'
            where: id = 'cat-001'
        - update:
            tableName: danh_muc
            columns:
              - column:
                  name: ten_danh_muc
                  value: 'Xe cộ và Phương tiện giao thông'
            where: id = 'cat-002'
        - update:
            tableName: danh_muc
            columns:
              - column:
                  name: ten_danh_muc
                  value: 'Tàu thuyền và Thiết bị hàng hải'
            where: id = 'cat-003'
        - update:
            tableName: danh_muc
            columns:
              - column:
                  name: ten_danh_muc
                  value: 'Máy bay và Thiết bị hàng không'
            where: id = 'cat-004'
        - update:
            tableName: danh_muc
            columns:
              - column:
                  name: ten_danh_muc
                  value: 'Máy móc công nghiệp và Thiết bị'
            where: id = 'cat-005'
        - update:
            tableName: danh_muc
            columns:
              - column:
                  name: ten_danh_muc
                  value: 'Công nghệ và Điện tử tiêu dùng'
            where: id = 'cat-006'

